<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK CAR | 프랜차이즈 통합 관리자</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* [대표님 기존 디자인 시스템 유지] */
        :root {
            --primary: #0052CC; --primary-dark: #003D99; --bg-body: #F4F7FA;
            --bg-sidebar: #1E293B; --text-main: #333333; --text-muted: #888888;
            --border: #E2E8F0; --white: #FFFFFF; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* [사이드바] */
        .sidebar { width: 260px; background-color: var(--bg-sidebar); color: var(--white); display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { font-size: 24px; font-weight: 900; color: #fff; }
        
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item { padding: 16px 24px; display: flex; align-items: center; gap: 15px; color: #94A3B8; text-decoration: none; font-weight: 600; cursor: pointer; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background-color: rgba(255,255,255,0.05); color: var(--white); border-left-color: var(--primary); }

        /* [메인 콘텐츠] */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .topbar { background: var(--white); height: 70px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .dashboard-wrap { padding: 30px; }

        /* 섹션 제어 (숨기기/보이기) */
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* 테이블 & 폼 스타일 */
        .card { background: var(--white); padding: 24px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #F8FAFC; padding: 12px; text-align: left; font-size: 13px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 15px 12px; border-bottom: 1px solid #F1F5F9; font-size: 14px; }
        
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; width: 100%; }
        .btn-main { padding: 12px 24px; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>PICK CAR</h2>
            <span>PRO 관리자 모드</span>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="showSection('section-inquiry', this)">
                <i class="fa-solid fa-list-check"></i> 실시간 문의 관리
            </div>
            <div class="nav-item" onclick="showSection('section-sites', this)">
                <i class="fa-solid fa-building"></i> 분양몰 공장 (생성)
            </div>
        </div>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="location.reload()">로그아웃</button>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-title" id="page-title">실시간 문의 관리</div>
            <div class="admin-profile">
                <div class="admin-avatar">종</div>
                <span>이종현 대표님</span>
            </div>
        </div>

        <div class="dashboard-wrap">
            
            <div id="section-inquiry" class="content-section active">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h3>📥 전체 상담 접수 내역</h3>
                        <button class="btn-main" onclick="fetchInquiries()" style="padding:8px 16px;">새로고침</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>접수일시</th>
                                <th>고객명</th>
                                <th>차종/현장</th>
                                <th>지역/메모</th>
                                <th>상태</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="inquiry-list">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="section-sites" class="content-section">
                <div class="card">
                    <h3 style="margin-bottom:20px;">🏗️ 신규 분양몰 개통하기</h3>
                    <div class="input-group">
                        <input type="text" id="site-title" placeholder="현장명 (예: 원주 푸르지오)">
                        <input type="text" id="site-slug" placeholder="주소명 (예: wonju)">
                        <input type="text" id="site-phone" placeholder="대표번호 (1588-0000)">
                        <input type="text" id="site-logo" placeholder="로고 이미지 URL">
                        <input type="color" id="site-color" title="사이트 테마 컬러">
                    </div>
                    <button class="btn-main" onclick="createSite()" style="width:100%;">분양몰 즉시 생성</button>
                </div>

                <div class="card">
                    <h3>🏢 현재 운영 중인 분양몰 리스트</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>현장명</th>
                                <th>주소(슬러그)</th>
                                <th>대표번호</th>
                                <th>생성일</th>
                                <th>상태</th>
                            </tr>
                        </thead>
                        <tbody id="site-list">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 수파베이스 설정
        const supabaseUrl = 'https://zewgvucgnpswdkghxdyt.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpld2d2dWNnbnBzd2RrZ2h4ZHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzQ4MjMsImV4cCI6MjA4ODY1MDgyM30.WfBS_D3U-8c71Mu3eASp-mF_wuwe5MJp66UJKkPPZio';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // 1. 섹션 전환 함수 (클릭 시 실행)
        function showSection(sectionId, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            el.classList.add('active');
            
            const title = sectionId === 'section-inquiry' ? '실시간 문의 관리' : '분양몰 공장 (생성)';
            document.getElementById('page-title').innerText = title;

            if(sectionId === 'section-sites') fetchSites();
            if(sectionId === 'section-inquiry') fetchInquiries();
        }

        // 2. 문의 내역 가져오기
        async function fetchInquiries() {
            const { data, error } = await supabaseClient.from('contacts').select('*').order('created_at', { ascending: false });
            if (error) return;

            const listArea = document.getElementById('inquiry-list');
            listArea.innerHTML = data.map(item => `
                <tr>
                    <td>${new Date(item.created_at).toLocaleString()}</td>
                    <td><strong>${item.user_name}</strong><br><small>${item.user_phone}</small></td>
                    <td>${item.car_item}</td>
                    <td>${item.region}<br><small>${item.memo || '-'}</small></td>
                    <td>${item.status}</td>
                    <td><button onclick="updateStatus(${item.id})" style="cursor:pointer;">상태변경</button></td>
                </tr>
            `).join('');
        }

        // 3. 신규 분양몰 생성
        async function createSite() {
            const title = document.getElementById('site-title').value;
            const slug = document.getElementById('site-slug').value;
            const phone = document.getElementById('site-phone').value;
            const logo = document.getElementById('site-logo').value;
            const color = document.getElementById('site-color').value;

            if(!title || !slug) { alert("현장명과 주소는 필수입니다!"); return; }

            const { error } = await supabaseClient.from('sites').insert([{ title, slug, phone, logo_url: logo, theme_color: color }]);
            
            if(error) alert("생성 실패: " + error.message);
            else { alert("🎉 분양몰 개통 완료!"); fetchSites(); }
        }

        // 4. 생성된 사이트 리스트 보기
        async function fetchSites() {
            const { data, error } = await supabaseClient.from('sites').select('*').order('created_at', { ascending: false });
            const siteArea = document.getElementById('site-list');
            siteArea.innerHTML = data.map(s => `
                <tr>
                    <td><strong>${s.title}</strong></td>
                    <td>${s.slug}.pickcar.co.kr</td>
                    <td>${s.phone}</td>
                    <td>${new Date(s.created_at).toLocaleDateString()}</td>
                    <td><span style="color:green;">운영중</span></td>
                </tr>
            `).join('');
        }

        // 초기 실행
        fetchInquiries();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK CAR | 최고 관리자 시스템</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* [사진과 동일한 디자인 시스템] */
        :root {
            --primary: #0052CC; --bg-body: #F0F2F5; --bg-sidebar: #2D3748;
            --text-main: #2D3748; --text-muted: #718096; --white: #FFFFFF;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* [사이드바] */
        .sidebar { width: 260px; background-color: var(--bg-sidebar); color: #fff; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header h2 { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .sidebar-header span { font-size: 11px; opacity: 0.5; }
        
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item { padding: 14px 24px; display: flex; align-items: center; gap: 12px; color: #A0AEC0; text-decoration: none; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: #fff; font-weight: 700; }
        .nav-item i { width: 20px; text-align: center; }

        /* [메인 콘텐츠] */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .topbar { background: var(--white); height: 70px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #E2E8F0; }
        .topbar h3 { font-size: 18px; font-weight: 800; }
        .profile { display: flex; align-items: center; gap: 12px; }
        .avatar-box { background: var(--primary); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 800; }

        .content-wrap { padding: 30px 40px; }

        /* [상단 4개 요약 카드] */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 24px; border-radius: 12px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; }
        .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
        .stat-value { font-size: 26px; font-weight: 900; }
        .stat-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* [데이터 테이블 카드] */
        .section-card { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: var(--shadow); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--text-muted); font-size: 13px; border-bottom: 1px solid #EDF2F7; }
        td { padding: 18px 12px; border-bottom: 1px solid #F7FAFC; font-size: 14px; }
        
        /* 상태 배지 */
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; }
        .new { background: #FFF5F5; color: #E53E3E; }
        .ing { background: #EBF8FF; color: #3182CE; }
        .done { background: #F0FFF4; color: #38A169; }

        /* 입력 폼 스타일 */
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #E2E8F0; border-radius: 6px; }
        .btn-blue { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 800; cursor: pointer; }

        /* 섹션 제어 */
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>PICK CAR</h2>
            <span>최고 관리자 시스템</span>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="showSection('dash', this)"><i class="fa-solid fa-chart-pie"></i> 대시보드</div>
            <div class="nav-item" onclick="alert('준비중입니다')"><i class="fa-solid fa-car"></i> 차량 DB 관리</div>
            <div class="nav-item" onclick="showSection('sites', this)"><i class="fa-solid fa-building"></i> 대리점(지점) 관리</div>
            <div class="nav-item" onclick="showSection('inquiry', this)"><i class="fa-solid fa-file-invoice"></i> 고객 문의 내역</div>
            <div class="nav-item" onclick="alert('준비중입니다')"><i class="fa-solid fa-users"></i> 본사 임직원 관리</div>
            <div class="nav-item" onclick="alert('준비중입니다')"><i class="fa-solid fa-gear"></i> 시스템 설정</div>
        </div>
        <div style="padding: 20px;"><button style="width:100%; padding:10px; background:#4A5568; color:#fff; border:none; border-radius:6px; cursor:pointer;" onclick="location.reload()">로그아웃</button></div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h3 id="topbar-title">대시보드 홈</h3>
            <div class="profile">
                <span>이종현 대표님</span>
                <div class="avatar-box">CEO</div>
            </div>
        </div>

        <div class="content-wrap">
            
            <div class="stat-grid">
                <div class="stat-card">
                    <div><div class="stat-label">오늘 신규 문의</div><div class="stat-value" id="stat-today">0건</div></div>
                    <div class="stat-icon" style="background:#FFF5F5; color:#E53E3E;"><i class="fa-solid fa-bell"></i></div>
                </div>
                <div class="stat-card">
                    <div><div class="stat-label">등록된 특가 차량</div><div class="stat-value">158대</div></div>
                    <div class="stat-icon" style="background:#EBF8FF; color:#3182CE;"><i class="fa-solid fa-car"></i></div>
                </div>
                <div class="stat-card">
                    <div><div class="stat-label">운영 중인 대리점</div><div class="stat-value" id="stat-sites">0곳</div></div>
                    <div class="stat-icon" style="background:#F0FFF4; color:#38A169;"><i class="fa-solid fa-shop"></i></div>
                </div>
                <div class="stat-card">
                    <div><div class="stat-label">이번 달 누적 계약</div><div class="stat-value">45건</div></div>
                    <div class="stat-icon" style="background:#FFFBEB; color:#D69E2E;"><i class="fa-solid fa-pen-nib"></i></div>
                </div>
            </div>

            <div id="section-dash" class="content-section active">
                <div class="section-card">
                    <div class="section-header">
                        <h3>최근 접수된 문의 (전국 통합)</h3>
                        <button onclick="fetchData()" style="padding:8px 16px; border:1px solid #ddd; background:none; border-radius:6px; cursor:pointer;">새로고침</button>
                    </div>
                    <table>
                        <thead>
                            <tr><th>상태</th><th>구분</th><th>고객명</th><th>연락처</th><th>희망 차종 / 지역</th><th>접수 지점</th><th>접수일시</th></tr>
                        </thead>
                        <tbody id="dash-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-sites" class="content-section">
                <div class="section-card" style="margin-bottom:20px;">
                    <h3>🏗️ 신규 대리점(분양몰) 개통</h3>
                    <div class="form-grid" style="margin-top:20px;">
                        <input type="text" id="site-title" placeholder="현장/지점명">
                        <input type="text" id="site-slug" placeholder="이차 도메인 (wonju 등)">
                        <input type="text" id="site-phone" placeholder="대표번호">
                    </div>
                    <button class="btn-blue" onclick="createSite()">대리점 즉시 개통</button>
                </div>
                <div class="section-card">
                    <h3>🏢 현재 운영 지점 리스트</h3>
                    <table style="margin-top:20px;">
                        <thead><tr><th>지점명</th><th>도메인 주소</th><th>대표번호</th><th>상태</th></tr></thead>
                        <tbody id="site-list"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const supabaseUrl = 'https://zewgvucgnpswdkghxdyt.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpld2d2dWNnbnBzd2RrZ2h4ZHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzQ4MjMsImV4cCI6MjA4ODY1MDgyM30.WfBS_D3U-8c71Mu3eASp-mF_wuwe5MJp66UJKkPPZio';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        function showSection(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            el.classList.add('active');
            document.getElementById('topbar-title').innerText = el.innerText;
        }

        async function fetchData() {
            // 문의 내역
            const { data: inquiries } = await supabaseClient.from('contacts').select('*').order('created_at', { ascending: false });
            // 대리점 내역
            const { data: sites } = await supabaseClient.from('sites').select('*');

            // 통계 업데이트
            document.getElementById('stat-today').innerText = inquiries.filter(i => new Date(i.created_at).toDateString() === new Date().toDateString()).length + "건";
            document.getElementById('stat-sites').innerText = sites.length + "곳";

            // 대시보드 리스트 렌더링
            document.getElementById('dash-list').innerHTML = inquiries.map(i => `
                <tr>
                    <td><span class="badge new">${i.status}</span></td>
                    <td>신차견적</td>
                    <td><strong>${i.user_name}</strong></td>
                    <td>${i.user_phone}</td>
                    <td>${i.car_item} / ${i.region}</td>
                    <td>원주 본점</td>
                    <td style="color:#A0AEC0;">${new Date(i.created_at).toLocaleString()}</td>
                </tr>
            `).join('');

            // 대리점 리스트 렌더링
            document.getElementById('site-list').innerHTML = sites.map(s => `
                <tr><td><strong>${s.title}</strong></td><td>${s.slug}.pickcar.co.kr</td><td>${s.phone}</td><td><span style="color:green">운영중</span></td></tr>
            `).join('');
        }

        async function createSite() {
            const title = document.getElementById('site-title').value;
            const slug = document.getElementById('site-slug').value;
            const phone = document.getElementById('site-phone').value;
            if(!title || !slug) return alert("필수값을 입력하세요");
            await supabaseClient.from('sites').insert([{ title, slug, phone }]);
            alert("지점이 개통되었습니다!");
            fetchData();
        }

        fetchData();
    </script>
</body>
</html>

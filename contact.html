<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담 및 창업 문의 | PICK CAR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* [메뉴 및 레이아웃 강제 고정] */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px; 
            background: #ffffff !important; border-bottom: 1px solid #eeeeee; 
            z-index: 9999; display: flex; align-items: center;
        }
        .header-inner {
            max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 26px; font-weight: 900; color: #0052CC !important; text-decoration: none; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: #333333 !important; font-weight: 700; font-size: 16px; }
        .nav-links a.active { color: #0052CC !important; }

        .contact-hero {
            padding: 160px 0 80px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            text-align: center;
        }
        .contact-hero h1 { font-size: clamp(32px, 5vw, 48px); font-weight: 900; color: #1a202c; }

        .contact-wrap {
            max-width: 800px; margin: -60px auto 100px;
            background: #fff; border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid #eee; overflow: hidden; position: relative; z-index: 10;
        }

        /* [탭 메뉴 스타일] */
        .tab-menu { display: flex; background: #f8fafc; border-bottom: 1px solid #eee; }
        .tab-btn {
            flex: 1; padding: 25px 0; text-align: center; font-size: 18px; font-weight: 800; 
            color: #718096; cursor: pointer; border: none; background: transparent; transition: 0.3s;
        }
        .tab-btn.active { color: #0052CC; background: #fff; border-bottom: 3px solid #0052CC; }

        /* [폼 영역 상세 스타일] */
        .form-area { padding: 50px; }
        .form-group { margin-bottom: 25px; }
        .form-label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 15px; color: #1a202c; }
        .form-label span.req { color: #E53E3E; margin-left: 5px; }
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 18px; border: 1.5px solid #edf2f7; border-radius: 12px;
            font-size: 16px; background: #fafafa; transition: 0.3s; outline: none;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #0052CC; background: #fff; box-shadow: 0 0 0 4px rgba(0,82,204,0.1); }
        .form-textarea { height: 150px; resize: none; }

        /* [개인정보 동의 박스] */
        .privacy-wrap { margin: 30px 0; padding: 20px; background: #f8fafc; border-radius: 12px; border: 1px solid #eee; }
        .privacy-box { height: 80px; overflow-y: auto; font-size: 13px; color: #718096; margin-bottom: 15px; padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 8px; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; font-weight: 600; cursor: pointer; }

        .btn-submit {
            width: 100%; padding: 22px; background: #0052CC; color: #fff; border: none;
            border-radius: 12px; font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-submit:hover { background: #003D99; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,82,204,0.3); }

        @media (max-width: 768px) { .form-area { padding: 30px 20px; } .nav-links { display: none; } }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="index.html" class="logo">PICK CAR</a>
            <nav class="nav-links">
                <a href="index.html#about">픽카 소개</a>
                <a href="index.html#car-list">차량견적</a>
                <a href="index.html#compare">금융비교</a>
                <a href="contact.html" class="active">상담/창업문의</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact-hero">
            <div class="container" data-aos="fade-up">
                <h1>빠르고 정확한 상담</h1>
                <p>신차 견적부터 창업 문의까지, 픽카가 확실하게 답변해 드립니다.</p>
            </div>
        </section>

        <section class="container">
            <div class="contact-wrap" data-aos="fade-up">
                <div class="tab-menu">
                    <button class="tab-btn active" id="tab-quote" onclick="switchTab('quote')">🚗 신차 견적 문의</button>
                    <button class="tab-btn" id="tab-franchise" onclick="switchTab('franchise')">🏢 창업 문의</button>
                </div>

                <div class="form-area">
                    <form id="unifiedForm">
                        <input type="hidden" name="type" id="inquiryType" value="신차견적">
                        
                        <div class="form-group">
                            <label class="form-label">성함 / 상호명 <span class="req">*</span></label>
                            <input type="text" name="name" class="form-input" placeholder="성함을 입력하세요" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">연락처 <span class="req">*</span></label>
                            <input type="tel" name="phone" class="form-input" placeholder="010-0000-0000" required>
                        </div>

                        <div id="quoteFields">
                            <div class="form-group">
                                <label class="form-label">희망 차종 <span class="req">*</span></label>
                                <input type="text" name="car_name" class="form-input" placeholder="예: 그랜저 하이브리드">
                            </div>
                            <div class="form-group">
                                <label class="form-label">구매 방식</label>
                                <select name="buy_method" class="form-select">
                                    <option value="장기렌트">장기렌트 (추천)</option>
                                    <option value="리스">자동차 리스</option>
                                    <option value="할부">신차 할부</option>
                                </select>
                            </div>
                        </div>

                        <div id="franchiseFields" style="display:none;">
                            <div class="form-group">
                                <label class="form-label">희망 지역 <span class="req">*</span></label>
                                <input type="text" name="region" class="form-input" placeholder="예: 강원 원주시">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">상세 문의내용</label>
                            <textarea name="message" class="form-textarea" placeholder="추가 문의사항을 입력해주세요."></textarea>
                        </div>

                        <div class="privacy-wrap">
                            <div class="privacy-box">
                                [개인정보 수집동의]<br>1. 수집항목: 이름, 연락처, 상담내용<br>2. 수집목적: 신차 견적 상담 및 지점 창업 안내<br>3. 보유기간: 상담 완료 후 1년 (이후 즉시 파기)
                            </div>
                            <label class="checkbox-label">
                                <input type="checkbox" id="privacyCheck" required> 개인정보 수집 및 이용에 동의합니다.
                            </label>
                        </div>

                        <button type="submit" class="btn-submit" id="submitBtn">
                            <i class="fa-regular fa-paper-plane"></i> 상담 신청 완료하기
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // 수파베이스 설정
        const supabaseUrl = 'https://zewgvucgnpswdkghxdyt.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpld2d2dWNnbnBzd2RrZ2h4ZHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzQ4MjMsImV4cCI6MjA4ODY1MDgyM30.WfBS_D3U-8c71Mu3eASp-mF_wuwe5MJp66UJKkPPZio';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const TG_TOKEN = '8716905489:AAENMbkYCjMbsA302CTQdN3Cd7AEnzVYoqE';
        const TG_CHAT_ID = '8716905489';

        function switchTab(type) {
            const quote = document.getElementById('quoteFields');
            const franchise = document.getElementById('franchiseFields');
            const typeInput = document.getElementById('inquiryType');
            const tabs = document.querySelectorAll('.tab-btn');

            tabs.forEach(t => t.classList.remove('active'));

            if(type === 'quote') {
                document.getElementById('tab-quote').classList.add('active');
                quote.style.display = 'block'; franchise.style.display = 'none';
                typeInput.value = '신차견적';
            } else {
                document.getElementById('tab-franchise').classList.add('active');
                quote.style.display = 'none'; franchise.style.display = 'block';
                typeInput.value = '창업문의';
            }
        }

        document.getElementById('unifiedForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            if(!document.getElementById('privacyCheck').checked) return alert("동의가 필요합니다.");

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 전송 중...';
            btn.disabled = true;

            try {
                // 1. DB 저장
                await supabaseClient.from('contacts').insert([{
                    user_name: data.name, user_phone: data.phone,
                    car_item: data.type === '신차견적' ? data.car_name : '창업상담',
                    contract_method: data.buy_method || data.region || '미정',
                    memo: data.message, status: '신규접수', site_name: 'PICK CAR 본사'
                }]);

                // 2. 텔레그램 발송
                const msg = `🚨 [픽카 신규문의]\n━━━━━━━━━━━━\n👤 성함: ${data.name}\n📞 번호: ${data.phone}\n📂 분류: ${data.type}\n📝 내용: ${data.car_name || data.region}\n💬 메모: ${data.message}`;
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg })
                });

                alert("접수 완료! 대표님이 확인 후 연락드리겠습니다.");
                location.reload();
            } catch(e) {
                alert("오류가 발생했습니다. 본사(1588-9097)로 전화주세요!");
                btn.disabled = false;
                btn.innerText = "상담 신청 완료하기";
            }
        });
    </script>
</body>
</html>

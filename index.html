<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>PICK CAR | 대한민국 1등 신차 장기렌트·리스 비교견적</title>
    <meta name="description" content="전 금융사 실시간 최저가 비교, 픽카(PICK CAR). 무서류 심사, 빠른 출고, 정직한 견적을 약속드립니다.">
    <meta name="author" content="Lee Jong-hyun">
    <link rel="canonical" href="https://pickcar.co.kr">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        /* [1. CSS Variables - 브랜드 컬러 시스템] */
        :root {
            --main-blue: #0052CC;      /* 신뢰의 삼성/현대급 블루 */
            --dark-blue: #0747A6;      /* 호버 및 강조용 */
            --light-blue: #E7F1FF;     /* 배경 및 포인트용 */
            --white: #FFFFFF;
            --gray-50: #F8F9FA;
            --gray-100: #E9ECEF;
            --gray-200: #DEE2E6;
            --gray-700: #495057;
            --gray-900: #212529;
            --danger: #E63946;         /* 가격 강조용 */
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 12px 30px rgba(0, 82, 204, 0.1);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* [2. Reset & Base] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--white); 
            color: var(--gray-900);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* [3. Header - 디테일한 투명도 및 스크롤 효과] */
        .pc-header {
            position: fixed; top: 0; width: 100%; height: 90px;
            display: flex; align-items: center; z-index: 1000;
            transition: var(--transition); background: transparent;
        }
        .pc-header.scrolled {
            height: 75px; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--gray-100);
            box-shadow: var(--shadow-sm);
        }
        .header-inner {
            width: 100%; max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px;
        }
        .logo { font-size: 28px; font-weight: 900; color: var(--main-blue); letter-spacing: -1.5px; }
        .gnb { display: flex; gap: 50px; }
        .gnb a { 
            font-size: 17px; font-weight: 600; color: var(--gray-700); 
            position: relative; padding: 10px 0;
        }
        .gnb a::after {
            content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 3px;
            background: var(--main-blue); transition: var(--transition); transform: translateX(-50%);
        }
        .gnb a:hover::after, .gnb a.active::after { width: 100%; }
        .gnb a:hover { color: var(--main-blue); }

        .header-util { display: flex; align-items: center; gap: 20px; }
        .btn-consult {
            background: var(--main-blue); color: #fff; padding: 12px 28px;
            border-radius: 50px; font-weight: 700; transition: var(--transition);
        }
        .btn-consult:hover { background: var(--dark-blue); box-shadow: var(--shadow-md); transform: translateY(-2px); }

        /* [4. Hero Slider - 압도적인 첫인상] */
        .hero-swiper { width: 100%; height: 100vh; position: relative; }
        .slide-item { position: relative; overflow: hidden; }
        .slide-bg {
            width: 100%; height: 100%; object-fit: cover;
            transform: scale(1.1); transition: transform 8s ease;
        }
        .swiper-slide-active .slide-bg { transform: scale(1); }
        .slide-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to right, rgba(255,255,255,0.9) 20%, transparent 80%);
            display: flex; align-items: center; padding: 0 10%;
        }
        .slide-text h2 { font-size: 70px; font-weight: 900; line-height: 1.1; margin-bottom: 30px; letter-spacing: -4px; }
        .slide-text h2 span { color: var(--main-blue); }
        .slide-text p { font-size: 22px; color: var(--gray-700); margin-bottom: 45px; }

        /* [5. Car Filter Section - 상세 필터링] */
        .filter-section { padding: 120px 0; background: var(--gray-50); }
        .section-title { text-align: center; margin-bottom: 80px; }
        .section-title h3 { font-size: 42px; font-weight: 800; margin-bottom: 15px; }
        .section-title p { color: var(--gray-400); font-size: 18px; }

        .filter-wrap {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 12px 30px; border-radius: 50px; background: #fff; border: 1px solid var(--gray-200);
            font-weight: 600; cursor: pointer; transition: var(--transition);
        }
        .filter-btn.active { background: var(--main-blue); color: #fff; border-color: var(--main-blue); }

        /* [6. Car Grid - 카드 디테일] */
        .car-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px; max-width: 1400px; margin: 0 auto; padding: 0 40px;
        }
        .car-card {
            background: var(--white); border-radius: 24px; overflow: hidden;
            border: 1px solid var(--gray-100); transition: var(--transition);
        }
        .car-card:hover { transform: translateY(-15px); box-shadow: var(--shadow-md); border-color: var(--main-blue); }
        .car-img-wrap { width: 100%; height: 220px; overflow: hidden; background: #f1f1f1; position: relative; }
        .car-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .car-card:hover .car-img-wrap img { transform: scale(1.1); }
        .badge-hot { 
            position: absolute; top: 20px; left: 20px; background: var(--danger); 
            color: #fff; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: 700;
        }

        .car-info { padding: 30px; }
        .car-brand { font-size: 14px; font-weight: 800; color: var(--main-blue); text-transform: uppercase; }
        .car-name { font-size: 24px; font-weight: 700; margin: 8px 0 20px; }
        .car-spec { 
            display: flex; justify-content: space-between; border-top: 1px solid var(--gray-100);
            padding-top: 20px; margin-bottom: 25px;
        }
        .spec-item { text-align: center; }
        .spec-label { font-size: 11px; color: var(--gray-400); display: block; }
        .spec-value { font-size: 14px; font-weight: 600; }

        .car-price-box {
            background: var(--light-blue); border-radius: 15px; padding: 20px; text-align: center;
        }
        .price-label { font-size: 13px; color: var(--main-blue); font-weight: 700; }
        .price-value { font-size: 28px; font-weight: 900; color: var(--gray-900); }
        .price-value span { font-size: 16px; font-weight: 500; }

        /* [7. Footer 디테일] */
        .footer { background: #1a1a1a; color: #fff; padding: 100px 0 50px; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 60px; margin-bottom: 60px; }
        .footer-logo { font-size: 30px; font-weight: 900; color: var(--main-blue); margin-bottom: 20px; display: block; }
        .footer-info p { color: #999; font-size: 14px; margin-bottom: 10px; }
        .footer-title { font-size: 18px; font-weight: 700; margin-bottom: 25px; }
        .footer-links li { margin-bottom: 15px; }
        .footer-links a { color: #999; font-size: 15px; }
        .footer-links a:hover { color: #fff; }

        /* [Animation] */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="pc-header">
        <div class="header-inner">
            <a href="#" class="logo">PICK CAR</a>
            <nav class="gnb">
                <a href="#hero" class="active">HOME</a>
                <a href="#cars">차량안내</a>
                <a href="#process">이용절차</a>
                <a href="#review">출고후기</a>
                <a href="#contact">상담신청</a>
            </nav>
            <div class="header-util">
                <a href="tel:1588-9097" style="font-weight: 700;"><i class="fa-solid fa-phone"></i> 1588-9097</a>
                <a href="#contact" class="btn-consult">빠른 견적신청</a>
            </div>
        </div>
    </header>

    <section id="hero" class="hero-swiper">
        <div class="slide-item">
            <div class="slide-overlay">
                <div class="slide-text" data-aos="fade-right">
                    <h2>신차 구매의<br><span>가장 현명한 선택</span></h2>
                    <p>전 금융사 실시간 최저가 비교 시스템으로<br>최적의 견적을 10분 만에 제안해 드립니다.</p>
                    <a href="#contact" class="btn-consult" style="padding: 20px 50px; font-size: 20px;">지금 바로 견적받기</a>
                </div>
            </div>
        </div>
    </section>

    <section id="cars" class="filter-section">
        <div class="container">
            <div class="section-title" data-aos="fade-up">
                <h3>PICK CAR 추천 매물</h3>
                <p>현재 가장 인기 있는 즉시 출고 가능 차량들입니다.</p>
            </div>

            <div class="filter-wrap" data-aos="fade-up">
                <button class="filter-btn active" onclick="filterBrand('전체')">전체</button>
                <button class="filter-btn" onclick="filterBrand('현대')">현대</button>
                <button class="filter-btn" onclick="filterBrand('기아')">기아</button>
                <button class="filter-btn" onclick="filterBrand('제네시스')">제네시스</button>
                <button class="filter-btn" onclick="filterBrand('수입차')">수입차</button>
            </div>

            <div id="car-list" class="car-grid">
                </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        AOS.init({ duration: 1000 });
        
        // 스크롤 시 헤더 변화
        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) document.querySelector('.pc-header').classList.add('scrolled');
            else document.querySelector('.pc-header').classList.remove('scrolled');
        });
    </script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PICKCAR | 차량 견적</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar__inner">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <div class="brand__title">PICKCAR</div>
          <div class="brand__sub">차량 견적</div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav__link" href="./index.html">차량목록</a>
        <a class="nav__link is-active" href="./car.html">견적</a>
      </nav>
      <a class="cta" href="tel:1588-9097">전화상담</a>
    </div>
  </header>

  <main class="wrap">
    <section class="section">
      <div class="section__head">
        <h2 id="title">차량 견적</h2>
        <div class="muted" id="sub"></div>
      </div>

      <div class="twoCol">
        <div class="panel">
          <div class="panel__title">조건 선택</div>

          <div class="form">
            <div class="row">
              <label>구분</label>
              <div class="seg" id="segPlan"></div>
            </div>

            <div class="row">
              <label>기간</label>
              <div class="seg" id="segTerm"></div>
            </div>

            <div class="row">
              <label>초기조건</label>
              <div class="seg" id="segPay"></div>
            </div>

            <div class="row">
              <label>등급(트림)</label>
              <select id="trim"></select>
            </div>
          </div>

          <div class="note">
            ※ 표기 금액은 “예상”이며 금융사/프로모션/심사 조건에 따라 변동됩니다.
          </div>
        </div>

        <div class="panel panel--big">
          <div class="panel__title">예상 월 비용</div>

          <div class="priceBox">
            <div class="priceBox__main">
              <div class="priceBox__num" id="price">-</div>
              <div class="tiny muted">원/월 (부가세/보험 포함 여부는 상품에 따라 달라질 수 있음)</div>
            </div>

            <div class="breakdown" id="breakdown"></div>

            <div class="ctaGrid" style="margin-top:14px;">
              <a class="btn btn--primary" href="tel:1588-9097">전화로 정확 견적 받기</a>
              <a class="btn btn--kakao" href="#" onclick="alert('카카오 채널 링크를 여기에 넣으세요'); return false;">카카오로 문의</a>
              <a class="btn btn--ghost" href="./index.html">다른 차량 보기</a>
            </div>
          </div>
        </div>
      </div>

      <div class="panel" style="margin-top:18px;">
        <div class="panel__title">“24개 금융사 비교” 이미지 자리</div>
        <div class="imgSlot">
          <div class="muted">
            여기엔 대표님이 준비한 이미지(PNG/JPG)를 업로드해서 넣으면 됩니다.<br/>
            파일명 예: <b>finance-24.png</b> (루트에 올리고 아래 img src만 바꾸면 끝)
          </div>
          <img class="imgPreview" src="./finance-24.png" alt="24개 금융사 비교 (이미지 자리)" onerror="this.style.display='none'">
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap">
      <div class="tiny muted">© PICKCAR · 예상 견적 페이지</div>
    </div>
  </footer>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
